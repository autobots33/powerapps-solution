name: Export Power Platform Solution

on:
  workflow_dispatch:

jobs:
  export-solution:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18' 

      - name: Install Power Platform CLI
        run: npm install -g pac

      - name: Authenticate
        run: |
          pac auth create --url "${{ secrets.POWER_PLATFORM_URL }}" --username "${{ secrets.POWER_PLATFORM_USERNAME }}" --password "${{ secrets.POWER_PLATFORM_PASSWORD }}"

      - name: Export Solution
        run: |
          pac solution export --name YourSolutionName --path solution.zip --managed false

      - name: Unpack Solution
        run: |
          pac solution unpack --zipfile solution.zip --folder src/solution --packagetype Unmanaged

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto export Power Apps solution"
          git push
