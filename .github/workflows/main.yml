name: Export Power Platform Solution

on:
  workflow_dispatch:

jobs:
  export-solution:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate & Export Solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.POWER_PLATFORM_URL }}
          user-name: ${{ secrets.POWER_PLATFORM_USERNAME }}
          password-secret: ${{ secrets.POWER_PLATFORM_PASSWORD }}
          solution-name: YourSolutionName
          solution-output-file: solution.zip
          managed: false

      - name: Unpack Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: solution.zip
          solution-folder: src/solution
          solution-type: Unmanaged

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto export Power Apps solution"
          git push
